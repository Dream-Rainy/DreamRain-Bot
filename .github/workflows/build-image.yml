name: Build Docker Image

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Export dependency license report
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: dependency-licenses
          outputs: type=local,dest=.
          cache-from: |
            type=gha,scope=image
            type=gha,scope=dependency-licenses
          cache-to: type=gha,scope=dependency-licenses,mode=max

      - name: Upload dependency license report
        uses: actions/upload-artifact@v6
        with:
          name: dependency-licenses
          path: DEPENDENCY_LICENSES.json
          if-no-files-found: error

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build metadata
        id: build_meta
        shell: bash
        run: |
          echo "time=$(TZ=Asia/Shanghai date +'%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=raw,value=next,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-') }}
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=master-${{ steps.build_meta.outputs.time }},enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=${{ steps.build_meta.outputs.version }}-${{ steps.build_meta.outputs.time }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=DreamRain-Bot NoneBot2 container image
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.created=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          build-args: |
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            VCS_REF=${{ github.sha }}
          cache-from: |
            type=gha,scope=image
            type=gha,scope=dependency-licenses
          cache-to: type=gha,scope=image,mode=max
